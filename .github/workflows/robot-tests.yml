name: Robot Framework Tests
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - 'docs/badge.json'

permissions:
  security-events: write
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked

      - name: Run Robocop lint
        run: uv run robocop check --reports sarif --exit-zero tests/ resources/

      - name: Upload SARIF to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .sarif.json
          category: robocop

      - name: Upload Robocop SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robocop-sarif
          path: .sarif.json
          include-hidden-files: true

  robot-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: uv sync --locked

      - name: Initialize Browser Library
        run: uv run rfbrowser init chromium

      - name: Run Robot Framework tests
        run: |
          uv run robot \
            --outputdir results \
            --loglevel DEBUG \
            --variable HEADLESS:true \
            tests/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: results/

      - name: Generate test result badge
        if: always()
        run: |
          python3 - << 'EOF'
          import json
          try:
              from robot.api import ExecutionResult
              result = ExecutionResult('results/output.xml')
              stats = result.statistics.total
              passed = stats.passed
              failed = stats.failed
              total = passed + failed
              if failed == 0:
                  color = "brightgreen"
                  message = f"{passed}/{total} passed"
              else:
                  color = "red"
                  message = f"{passed}/{total} passed, {failed} failed"
          except Exception as e:
              print(f"Could not parse test results: {e}")
              color = "lightgrey"
              message = f"error: {e}"
          badge = {"schemaVersion": 1, "label": "tests", "message": message, "color": color}
          with open('docs/badge.json', 'w') as f:
              json.dump(badge, f)
          print(f"Badge written: {badge}")
          EOF

      - name: Commit test result badge
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/badge.json
          if git diff --staged --quiet; then
            echo "No changes to badge.json"
          else
            git commit -m "chore: update test result badge"
            git push
          fi
